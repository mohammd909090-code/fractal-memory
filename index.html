<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قناص التشارت</title>

  <style>
    body {
      margin: 0;
      background: #0b0f14;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 98%;
      max-width: 1600px;
      margin: auto;
      padding: 12px;
    }

    .top-box {
      background: #111827;
      border: 1px solid #243044;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    select, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    select {
      background: #1f2937;
      color: white;
    }

    button {
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    .chart-box {
      width: 100%;
      height: 78vh;
      min-height: 620px;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #243044;
    }

    #tradingview_chart {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 768px) {
      .container {
        width: 100%;
        padding: 6px;
      }

      .chart-box {
        height: 76vh;
        min-height: 560px;
        border-radius: 8px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="top-box">
      <label>اختر الأصل:</label>

      <select id="symbolSelect">
        <option value="OANDA:XAUUSD">الذهب XAUUSD</option>
        <option value="BINANCE:BTCUSDT">بتكوين BTCUSDT</option>
        <option value="NASDAQ:AAPL">Apple</option>
        <option value="NASDAQ:TSLA">Tesla</option>
        <option value="NASDAQ:NVDA">Nvidia</option>
      </select>

      <button onclick="loadChart()">تحديث التشارت</button>
    </div>

    <div class="chart-box">
      <div id="tradingview_chart"></div>
    </div>

  </div>

  <script src="https://s3.tradingview.com/tv.js"></script>

  <script>
    let chartWidget = null;

    function loadChart() {
      const symbol = document.getElementById("symbolSelect").value;

      document.getElementById("tradingview_chart").innerHTML = "";

      chartWidget = new TradingView.widget({
        container_id: "tradingview_chart",
        width: "100%",
        height: "100%",
        symbol: symbol,
        interval: "15",
        timezone: "Asia/Riyadh",
        theme: "dark",
        style: "1",
        locale: "ar",
        toolbar_bg: "#0b0f14",
        enable_publishing: false,
        allow_symbol_change: true,
        hide_side_toolbar: false,
        withdateranges: true,
        details: true,
        hotlist: false,
        calendar: false,
        studies: [],
        autosize: true
      });
    }

    window.onload = loadChart;
  </script>

</body>
</html>
