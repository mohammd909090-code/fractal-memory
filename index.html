<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قناص التشارت</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #0b0f14;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .container {
      width: 100vw;
      max-width: 100vw;
      padding: 8px;
      box-sizing: border-box;
    }

    .top-box {
      background: #111827;
      border: 1px solid #243044;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    select, button {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      box-sizing: border-box;
    }

    select {
      background: #1f2937;
      color: white;
    }

    button {
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    .chart-box {
      width: 100%;
      height: calc(100vh - 190px);
      min-height: 720px;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #243044;
      box-sizing: border-box;
    }

    #tradingview_chart {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 768px) {
      .container {
        padding: 4px;
      }

      .top-box {
        margin: 4px 4px 8px 4px;
      }

      .chart-box {
        width: 100vw;
        margin-left: -4px;
        margin-right: -4px;
        height: calc(100vh - 185px);
        min-height: 760px;
        border-radius: 6px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="top-box">
      <label>اختر الأصل:</label>

      <select id="symbolSelect">
        <option value="OANDA:XAUUSD">الذهب XAUUSD</option>
        <option value="BINANCE:BTCUSDT">بتكوين BTCUSDT</option>
        <option value="NASDAQ:AAPL">Apple</option>
        <option value="NASDAQ:TSLA">Tesla</option>
        <option value="NASDAQ:NVDA">Nvidia</option>
      </select>

      <button onclick="loadChart()">تحديث التشارت</button>
    </div>

    <div class="chart-box">
      <div id="tradingview_chart"></div>
    </div>

  </div>

  <script src="https://s3.tradingview.com/tv.js"></script>

  <script>
    let chartWidget = null;

    function loadChart() {
      const symbol = document.getElementById("symbolSelect").value;

      document.getElementById("tradingview_chart").innerHTML = "";

      chartWidget = new TradingView.widget({
        container_id: "tradingview_chart",
        width: "100%",
        height: 760,
        symbol: symbol,
        interval: "15",
        timezone: "Asia/Riyadh",
        theme: "dark",
        style: "1",
        locale: "ar",
        toolbar_bg: "#0b0f14",
        enable_publishing: false,
        allow_symbol_change: true,
        hide_side_toolbar: false,
        withdateranges: true,
        details: true,
        hotlist: false,
        calendar: false,
        studies: []
      });
    }

    window.onload = loadChart;
    window.onresize = loadChart;
  </script>

</body>
</html>
